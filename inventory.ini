[raspberrypi]
# First deploy on a fresh SD card: use the Pi's current IP (check your router's DHCP table)
# After first deploy: switch ansible_host to spotifydisplay.local (works via mDNS forever after)
pinode1 ansible_host=YOUR_PI_IP ansible_user=YOUR_USERNAME ansible_password=YOUR_PASSWORD ansible_become_password=YOUR_PASSWORD ansible_python_interpreter=/usr/bin/python3
